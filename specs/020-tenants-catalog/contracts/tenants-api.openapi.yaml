openapi: 3.1.0
info:
  title: Ramcar Platform — Tenants API
  version: 020-tenants-catalog
  description: |
    REST contract for the `/api/tenants` surface introduced by feature 020-tenants-catalog.
    See ../data-model.md for the Tenant entity shape and ../research.md for open plan-phase
    decisions that shaped these endpoints.

servers:
  - url: /api
    description: NestJS backend mounted under /api (same origin as the portal)

security:
  - bearerAuth: []

paths:
  /tenants:
    get:
      summary: List tenants (role-scoped)
      description: |
        Returns tenants visible to the caller.
        - SuperAdmin: every tenant in the system.
        - Admin: only tenants in `user_tenants` for the caller.
        - Guard: same as Admin (list endpoint is Admin-only by controller guard; Guard
          consumes the lighter `scope=selector` projection via the same URL via a
          separate `TenantSelector` controller path — see §R-15).
        Applies `search`, `status`, `page`, `page_size` filters when present.
        Responds 403 for callers with role `guard` or `resident` on the catalog path.
      operationId: listTenants
      tags: [tenants]
      parameters:
        - name: search
          in: query
          description: Case-insensitive substring over `name` + `address`. Applied server-side.
          schema: { type: string, minLength: 0, maxLength: 255 }
        - name: status
          in: query
          description: |
            `active` | `inactive` | `all` (default `active`). `all` returns both statuses.
            For Admin/Guard, inactive tenants are still excluded from the selector projection
            regardless of this filter — see `scope=selector` behaviour.
          schema:
            type: string
            enum: [active, inactive, all]
            default: active
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, enum: [10, 25, 50, 100], default: 25 }
        - name: scope
          in: query
          description: |
            Optional hint. `selector` returns the lightweight projection
            `{ id, name, slug, image_path, status }` suitable for the TopBar TenantSelector.
            Absent or any other value returns the full `Tenant` object.
          schema: { type: string, enum: [selector] }
        - name: include_inactive
          in: query
          description: |
            SuperAdmin-only. When `true`, the response includes `status='inactive'` rows
            even when `scope=selector` is set. Ignored for other roles.
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Paginated tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTenantResponse'
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

    post:
      summary: Create a tenant
      description: |
        Creates a new tenant. Body must conform to `CreateTenantDto`.
        - SuperAdmin: any tenant.
        - Admin: creates the tenant AND a `user_tenants` row linking the Admin
          (with `assigned_by = <admin user id>`) in the same transaction.
        - Guard/Resident: 403.
        A `// TODO: enforce tenant limit per admin based on subscription tier` comment
        is left at the Admin-path check site (FR-013).
      operationId: createTenant
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantDto'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409":
          description: Slug collision after 5 retries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /tenants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      summary: Fetch one tenant (edit prefill)
      operationId: getTenant
      tags: [tenants]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

    patch:
      summary: Update a tenant
      description: |
        Partial update. Authorization:
        - SuperAdmin: any tenant, any field (including `status`).
        - Admin: only tenants in their `tenant_ids`. May NOT change `status` (FR-015).
          Requests from Admin tokens carrying a status change return 403.
      operationId: updateTenant
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTenantDto' }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /tenants/{id}/image:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    post:
      summary: Upload or replace a tenant image
      description: |
        Multipart upload, one `file` field. Accepts JPEG / PNG / WebP up to 2 MiB.
        Replaces any existing image — the previous object is deleted best-effort
        (failure logged, orphan tracked as known v1 limitation — FR-011d).
        Authorization: mirrors `PATCH /api/tenants/:id` (name/address rule, not the
        SuperAdmin-only status rule) — FR-015a.
      operationId: uploadTenantImage
      tags: [tenants]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded; returns the tenant with the refreshed `image_path`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        "400":
          description: Invalid file (wrong MIME, oversize, missing field).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "413":
          description: File exceeds 2 MiB
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "415":
          description: MIME not in { jpeg, png, webp }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    delete:
      summary: Clear a tenant image
      description: |
        Sets `image_path` to null. Deletes the stored object best-effort.
        Authorization mirrors `PATCH /api/tenants/:id` (FR-015a).
      operationId: deleteTenantImage
      tags: [tenants]
      responses:
        "200":
          description: Cleared; returns the tenant with `image_path = null`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Caller not authorized for this resource/action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Tenant not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Tenant:
      type: object
      required: [id, name, slug, address, status, config, time_zone, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string, minLength: 1, maxLength: 255 }
        slug:       { type: string, minLength: 1 }
        address:    { type: string }
        status:     { type: string, enum: [active, inactive] }
        config:     { type: object, additionalProperties: true }
        image_path: { type: [string, "null"], nullable: true, description: "Object path inside the `tenant-images` bucket. Public URL is composed client-side." }
        time_zone:  { type: string, example: "America/Mexico_City" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TenantSelectorProjection:
      type: object
      description: Lightweight projection returned when `scope=selector` is set.
      required: [id, name, slug, status]
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        slug:       { type: string }
        status:     { type: string, enum: [active, inactive] }
        image_path: { type: [string, "null"], nullable: true }

    CreateTenantDto:
      type: object
      required: [name, address]
      properties:
        name:    { type: string, minLength: 1, maxLength: 255 }
        address: { type: string, minLength: 1 }
        status:
          type: string
          enum: [active, inactive]
          default: active
          description: SuperAdmin or Admin may send this on create; defaults to `active`. Only SuperAdmin may change it on update.
        config:
          type: object
          additionalProperties: true
          default: {}

    UpdateTenantDto:
      type: object
      description: |
        Partial update. Admin tokens that include `status` produce 403 at the guard
        (defense in depth) or 422 at the pipe (field-level reject).
      properties:
        name:    { type: string, minLength: 1, maxLength: 255 }
        address: { type: string, minLength: 1 }
        status:  { type: string, enum: [active, inactive] }
        config:
          type: object
          additionalProperties: true

    PaginatedTenantResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/Tenant'
              - $ref: '#/components/schemas/TenantSelectorProjection'
        meta:
          type: object
          required: [page, page_size, total, total_pages]
          properties:
            page:        { type: integer, minimum: 1 }
            page_size:   { type: integer, minimum: 1 }
            total:       { type: integer, minimum: 0 }
            total_pages: { type: integer, minimum: 0 }

    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer }
        message:    { type: string }
        error:      { type: string, description: "HTTP error name, e.g. Forbidden" }
        details:
          type: array
          description: Per-field Zod issues when applicable.
          items:
            type: object
            properties:
              path:    { type: array, items: { type: string } }
              message: { type: string }
